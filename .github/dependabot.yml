version: 2
updates:
  # Keep GitHub Actions pinned SHAs up to date (covers all workflows including pre-commit-autoupdate.yml).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Keep Python dependencies in pyproject.toml up to date.
  # Using the uv ecosystem so Dependabot understands uv-managed projects.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
