name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run yamllint
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47  # v1.5.0

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "0.6.10"

      - name: Install dependencies
        # --dev installs ruff and other lint tools (pre-commit, yamllint).
        # Firmware build workflows omit --dev as they only need esphome.
        run: uv sync --all-extras --dev

      - name: Run ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

  cpp-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run clang-format
        uses: jidicula/clang-format-action@654a770daa28443dd111d133e4083e21c1075674  # v4.18.0
        with:
          clang-format-version: '17'
          check-path: 'components'
          exclude-regex: '(test|examples|docs)'

  cpp-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        # Mirrors the cppcheck pre-commit hook config in .pre-commit-config.yaml.
        # actions.h is excluded: it contains template bodies that generate false
        # positives without the full ESPHome include path available.
        run: |
          find components/m5stack_barcode \( -name '*.cpp' -o -name '*.h' \) \
            ! -name 'actions.h' | sort | xargs \
          cppcheck \
            --std=c++17 \
            --language=c++ \
            --enable=warning,style,performance,portability \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=unusedStructMember \
            --suppress=constVariableReference \
            --suppress=unknownMacro \
            --error-exitcode=1
