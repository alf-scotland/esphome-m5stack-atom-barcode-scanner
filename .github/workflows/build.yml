name: Build Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'firmware.yaml'
      - 'components/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'firmware.yaml'
      - 'components/**'
      - '.github/workflows/build.yml'
  schedule:
    # Run weekly on Monday at 01:00 UTC
    - cron: '0 1 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install esphome==2025.2.2

      - name: Validate configuration
        run: |
          esphome config firmware.yaml

      - name: Build firmware
        run: |
          esphome compile firmware.yaml

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .esphome/build/*/.pioenvs/*/firmware*.bin
            .esphome/build/*/.pioenvs/*/firmware.elf
          retention-days: 90
