name: PR Firmware

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'firmware.yaml'
      - 'components/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag or commit SHA to build'
        required: true
        default: 'main'

jobs:
  build-pr-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install esphome==2025.2.2

      - name: Create secrets.yaml for CI
        run: |
          cp secrets.yaml.example secrets.yaml

      - name: Get PR number
        id: get_pr
        if: github.event_name == 'pull_request'
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Set reference info
        id: set_ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "ref_name=pr-${{ steps.get_pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "branch_name=${{ steps.get_pr.outputs.pr_branch }}" >> $GITHUB_OUTPUT
          else
            echo "ref_name=${{ github.event.inputs.ref || github.ref_name }}" >> $GITHUB_OUTPUT
            echo "branch_name=${{ github.event.inputs.ref || github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create OTA-enabled firmware for testing
        run: |
          # Create a version with PR or branch info
          PR_VERSION="${{ steps.set_ref.outputs.ref_name }}"

          # Update version in firmware.yaml
          sed -i "s/project_version: \".*\"/project_version: \"$PR_VERSION\"/" firmware.yaml

          # Create OTA-enabled firmware config
          cp firmware.yaml firmware-ota.yaml

          # Update repository config to point to the correct branch
          sed -i "s/ref: main/ref: ${{ steps.set_ref.outputs.branch_name }}/" firmware-ota.yaml

          # Build the firmware
          esphome compile firmware-ota.yaml

      - name: Upload PR firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-firmware-${{ steps.set_ref.outputs.ref_name }}
          path: .esphome/build/*/*.bin
          retention-days: 30

      - name: Add PR comment with firmware link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifactName = `pr-firmware-pr-${{ steps.get_pr.outputs.pr_number }}`;
            const runId = context.runId;
            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const comment = `## OTA Firmware Build

            🔄 OTA-enabled firmware has been built for this PR for testing.

            Download the firmware from the [workflow artifacts](${workflowUrl}).

            ### How to use:

            1. Download the firmware binary from the workflow artifacts
            2. Flash it to your device using ESPHome dashboard or Home Assistant
            3. The device will be configured to automatically update from this PR branch

            This allows for easy testing of changes without rebuilding firmware.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
