name: PR Firmware

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'firmware/**'
      - 'firmware.yaml'
      - 'components/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag or commit SHA to build'
        required: true
        default: 'main'

# Define required permissions explicitly
permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  build-pr-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "0.6.10"

      - name: Install dependencies
        # No --dev: PR firmware builds only need esphome, not lint/format tools.
        run: uv sync --all-extras

      - name: Get PR number
        id: get_pr
        if: github.event_name == 'pull_request'
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Set reference info
        id: set_ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "ref_name=pr-${{ steps.get_pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "ref_name=${{ github.event.inputs.ref || github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in firmware
        run: |
          # Stamp a PR-specific version so the built binary is identifiable
          PR_VERSION="${{ steps.set_ref.outputs.ref_name }}"
          sed -i "s/project_version: \".*\"/project_version: \"$PR_VERSION\"/" firmware/atom_lite.yaml

      - name: Compile firmware
        run: |
          uv run esphome compile firmware/atom_lite.yaml

      - name: Find and copy firmware files
        id: find_firmware
        run: |
          # Create a directory for the firmware files
          mkdir -p firmware-files

          # Copy all firmware files to the firmware-files directory
          find . -path '*/.esphome/*' -type f -name "*.bin" -exec cp {} firmware-files/ \;

          # List the firmware files and log them
          echo "Available firmware files:"
          ls -la firmware-files/

      - name: Upload firmware artifacts
        id: upload_artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pr-firmware-${{ steps.set_ref.outputs.ref_name }}
          path: firmware-files/*.bin
          retention-days: 30
          if-no-files-found: error
          overwrite: true

      - name: Delete previous workflow comments
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            // Get all comments on the PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Find and delete previous workflow comments that start with "## Firmware Build"
            for (const comment of comments.data) {
              if (comment.body.trim().startsWith('## Firmware Build') &&
                  comment.user.login === 'github-actions[bot]') {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
                console.log(`Deleted comment ${comment.id}`);
              }
            }

      - name: Add PR comment with firmware link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const artifactName = `pr-firmware-pr-${{ steps.get_pr.outputs.pr_number }}`;
            const runId = context.runId;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            // Direct download URL for the artifacts page
            const downloadUrl = `${repoUrl}/actions/runs/${runId}/artifacts`;

            // Get artifacts info to provide the exact artifact URL if possible
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });

            // Try to find our specific artifact
            const artifact = artifacts.data.artifacts.find(a => a.name === artifactName);

            // If we found the artifact, use its direct URL, otherwise use the artifacts page
            const artifactUrl = artifact
              ? `${downloadUrl}/${artifact.id}`
              : downloadUrl;

            // Generate description of firmware files
            const firmwareFiles = [
              {name: "firmware.bin", description: "Main firmware - For standard flashing via ESPHome dashboard"},
              {name: "firmware.factory.bin", description: "Factory firmware - For first-time flashing or complete reset"},
              {name: "firmware.ota.bin", description: "OTA firmware - For OTA updates"}
            ];

            let firmwareFilesHtml = firmwareFiles.map(file =>
              `- **${file.name}** - ${file.description}`
            ).join('\n');

            const comment = `## Firmware Build

            ✅ Firmware has been built for this PR for testing.

            ### Download Firmware Files

            [📥 **Download Firmware Artifacts**](${artifactUrl})

            The download includes:
            ${firmwareFilesHtml}

            ### How to flash

            1. Download and extract the firmware zip from the link above
            2. Select the appropriate firmware file based on your needs
            3. Flash it using one of these methods:
               - ESPHome dashboard in Home Assistant
               - Web flasher at [web.esphome.io](https://web.esphome.io/)
               - ESPHome command line tool

            This allows for easy testing of changes without rebuilding firmware.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
