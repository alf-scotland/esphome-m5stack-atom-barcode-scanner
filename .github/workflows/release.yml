name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.beta.*'
      - 'v*.*.*.rc.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "0.6.10"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

          # Check if this is a pre-release
          if [[ "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          # Update version in firmware.yaml
          sed -i "s/project_version: \".*\"/project_version: \"$TAG\"/" firmware.yaml

      - name: Build firmware
        run: |
          mkdir -p release-files
          uv run esphome compile firmware.yaml
          cp -v .esphome/build/*/*/*.bin release-files/ || echo "No firmware files found"
          ls -la release-files/

      - name: Generate manifest file
        run: |
          # Get the firmware file name
          FIRMWARE_FILE=$(find release-files -name "*.bin" -type f | head -n1)
          if [ -z "$FIRMWARE_FILE" ]; then
            echo "No firmware file found!"
            exit 1
          fi
          FIRMWARE_NAME=$(basename "$FIRMWARE_FILE")

          # Calculate MD5 hash
          MD5_HASH=$(md5sum "$FIRMWARE_FILE" | cut -d ' ' -f1)

          # Create manifest file
          cat > release-files/manifest.json << EOF
          {
            "name": "ESPHome M5Stack Atom Barcode Scanner",
            "version": "${{ steps.extract_version.outputs.version }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "ota": {
                  "md5": "$MD5_HASH",
                  "path": "$FIRMWARE_NAME",
                  "release_url": "https://github.com/scotland/esphome-m5stack-atom-barcode-scanner/releases/tag/v${{ steps.extract_version.outputs.version }}",
                  "summary": "Release v${{ steps.extract_version.outputs.version }}"
                }
              }
            ]
          }
          EOF

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: ${{ steps.extract_version.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            release-files/*.bin
            release-files/manifest.json
