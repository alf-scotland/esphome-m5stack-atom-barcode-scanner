name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "0.6.10"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Extract and validate version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}

          # Validate tag matches CalVer YYYY.MM.PATCH with optional pre-release suffix
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]+\.[0-9]+(-(beta|rc)\.[0-9]+)?$ ]]; then
            echo "ERROR: Tag 'v$TAG' does not match expected format vYYYY.MM.PATCH or vYYYY.MM.PATCH-(beta|rc).N"
            exit 1
          fi

          echo "version=$TAG" >> $GITHUB_OUTPUT

          if [[ "$TAG" == *-beta.* || "$TAG" == *-rc.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in firmware
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          sed -i "s/project_version: \".*\"/project_version: \"$VERSION\"/" atom_lite.yaml
          grep "project_version" atom_lite.yaml

      - name: Build firmware
        run: |
          uv run esphome compile atom_lite.yaml

      - name: Copy firmware binaries to release directory
        run: |
          mkdir -p release-files
          find .esphome -path "*/.pioenvs/*/firmware*.bin" -type f -exec cp -v {} release-files/ \;
          if [ -z "$(ls -A release-files/)" ]; then
            echo "ERROR: No firmware binaries found after build"
            exit 1
          fi
          echo "Release files:"
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: ${{ steps.extract_version.outputs.is_prerelease }}
          generate_release_notes: true
          files: release-files/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
