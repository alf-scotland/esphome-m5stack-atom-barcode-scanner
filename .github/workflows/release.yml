name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "0.6.10"

      - name: Install dependencies
        # No --dev: release builds only need esphome, not lint/format tools.
        run: uv sync --all-extras

      - name: Extract and validate version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}

          # Validate tag matches CalVer YYYY.MM.PATCH with optional pre-release suffix
          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]+\.[0-9]+(-(beta|rc)\.[0-9]+)?$ ]]; then
            echo "ERROR: Tag 'v$TAG' does not match expected format vYYYY.MM.PATCH or vYYYY.MM.PATCH-(beta|rc).N"
            exit 1
          fi

          echo "version=$TAG" >> $GITHUB_OUTPUT

          if [[ "$TAG" == *-beta.* || "$TAG" == *-rc.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify firmware version matches tag
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          YAML_VERSION=$(grep 'project_version:' firmware/atom_lite.yaml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$YAML_VERSION" != "$VERSION" ]; then
            echo "ERROR: tag v$VERSION does not match project_version '$YAML_VERSION' in firmware/atom_lite.yaml"
            echo "Update project_version in firmware/atom_lite.yaml to '$VERSION' and commit before tagging."
            exit 1
          fi
          echo "Version verified: $VERSION"

      - name: Create secrets for release build
        run: |
          cat > firmware/secrets.yaml << EOF
          api_encryption_key: "${{ secrets.API_ENCRYPTION_KEY }}"
          ota_password: "${{ secrets.OTA_PASSWORD }}"
          EOF

      - name: Build firmware
        run: |
          uv run esphome compile firmware/atom_lite.yaml

      - name: Copy firmware binaries to release directory
        run: |
          mkdir -p release-files
          find . -path '*/.esphome/*' -path '*/.pioenvs/*/firmware*.bin' -type f -exec cp -v {} release-files/ \;
          if [ -z "$(ls -A release-files/)" ]; then
            echo "ERROR: No firmware binaries found after build"
            exit 1
          fi
          echo "Release files:"
          ls -lh release-files/

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: ${{ steps.extract_version.outputs.is_prerelease }}
          generate_release_notes: true
          files: release-files/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OTA manifest
        # Skip manifest update for pre-releases — only stable versions are offered as OTA.
        if: steps.extract_version.outputs.is_prerelease == 'false'
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OTA_BIN="release-files/firmware.ota.bin"
          MD5=$(md5sum "$OTA_BIN" | cut -d' ' -f1)
          OTA_URL="https://github.com/alf-scotland/esphome-m5stack-atom-barcode-scanner/releases/download/v${VERSION}/firmware.ota.bin"
          RELEASE_URL="https://github.com/alf-scotland/esphome-m5stack-atom-barcode-scanner/releases/tag/v${VERSION}"

          # Fetch the auto-generated release notes from GitHub — generate_release_notes:true
          # populates them server-side but doesn't expose them as a softprops action output.
          RELEASE_SUMMARY=$(gh release view "v${VERSION}" --json body --jq '.body')

          mkdir -p manifests
          # Use Python for safe JSON serialisation — release body contains newlines and quotes.
          python3 - "$VERSION" "$OTA_URL" "$MD5" "$RELEASE_URL" <<'PYEOF'
          import json, sys, os
          version, ota_url, md5, release_url = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          manifest = {
              "name": "atom-barcode",
              "version": version,
              "builds": [{
                  "chipFamily": "ESP32",
                  "ota": {
                      "path": ota_url,
                      "md5": md5,
                      "summary": os.environ.get("RELEASE_SUMMARY", ""),
                      "release_url": release_url,
                  },
              }],
          }
          with open("manifests/atom_lite.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PYEOF

          echo "Generated manifests/atom_lite.json:"
          cat manifests/atom_lite.json

      - name: Commit manifest to main
        if: steps.extract_version.outputs.is_prerelease == 'false'
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifests/atom_lite.json
          git commit -m "chore: update OTA manifest for v${VERSION} [skip ci]"
          git push origin main
