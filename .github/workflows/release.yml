name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.beta.*'
      - 'v*.*.*.rc.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install uv
        run: |
          pip install uv

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .

      - name: Create secrets.yaml for CI
        run: |
          cp secrets.yaml.example secrets.yaml

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

          # Check if this is a pre-release
          if [[ "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          # Update version in firmware.yaml
          sed -i "s/project_version: \".*\"/project_version: \"$TAG\"/" firmware.yaml

      - name: Build firmware
        run: |
          source .venv/bin/activate
          esphome compile firmware.yaml

      - name: Find binary files
        run: |
          echo "Listing build directory structure:"
          find .esphome -name "*.bin" -type f | sort

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: ${{ steps.extract_version.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            .esphome/build/*/.pioenvs/*/firmware*.bin
