name: Update uv lockfile for Dependabot

# Dependabot updates pyproject.toml but does not regenerate uv.lock.
# This workflow runs on every push Dependabot makes to a uv branch and
# commits the updated lock file back, keeping pyproject.toml and uv.lock
# in sync before the PR hits CI.
on:
  push:
    branches:
      - 'dependabot/uv/**'

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.6.10"

      - name: Regenerate lock file
        run: uv lock

      - name: Commit updated lock file
        run: |
          if git diff --quiet uv.lock; then
            echo "uv.lock is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: update uv.lock"
          git push
