name: pre-commit autoupdate

on:
  schedule:
    # Run weekly on Mondays at 08:00 UTC, same cadence as Dependabot.
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install pre-commit
        run: uv sync --all-extras

      - name: Run pre-commit autoupdate
        run: uv run pre-commit autoupdate

      - name: Open PR if hooks changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "chore: pre-commit autoupdate"
          branch: chore/pre-commit-autoupdate
          delete-branch: true
          title: "chore: pre-commit autoupdate"
          body: |
            Automated weekly update of pre-commit hook revisions via `pre-commit autoupdate`.

            Review each changed hook version before merging.
          labels: dependencies
