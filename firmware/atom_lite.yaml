# M5Stack Atom Lite — barcode scanner firmware.
#
# Includes core.yaml for the shared scanner config and adds everything specific
# to the Atom Lite hardware: ESP32 board, UART GPIO assignment, the onboard
# SK6812 LED, the physical button, the scanner DLED line, and all LED scripts.
#
# LED state machine:
#   WiFi disconnected              → orange pulse (led_wifi_connecting)
#   WiFi up, API down              → white pulse  (led_api_connecting)
#   API connected, idle            → off          (via led_off)
#   Manual scan active (HOST mode) → solid blue
#   Continuous/AutoSense active    → solid purple
#   Scan success                   → green flash 500ms, then led_off
#   DLED triggered                 → yellow flash 200ms, then led_off
#   Scan timeout                   → orange flash 500ms, then led_off
#
# led_off is the canonical "return to correct idle state" script.
# It checks scan state and connectivity rather than always turning the LED
# off, ensuring transient flashes always restore the right underlying state.

substitutions:
  name: atom-barcode
  friendly_name: Atom Barcode Scanner
  project_name: esphome-m5stack-atom-barcode-scanner
  project_version: "2026.4.0"

packages:
  core: !include core.yaml

update:
  - platform: http_request
    name: "Firmware Update"
    source: https://raw.githubusercontent.com/alf-scotland/esphome-m5stack-atom-barcode-scanner/main/manifests/atom_lite.json

dashboard_import:
  package_import_url: github://alf-scotland/esphome-m5stack-atom-barcode-scanner/atom_lite.yaml@main
  import_full_config: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: scotland.${project_name}
    version: ${project_version}
  on_boot:
    priority: -100
    then:
      - script.execute: led_wifi_connecting

esp32:
  board: m5stack-atom
  framework:
    type: arduino

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: 19
  rx_pin: 22

# ── Hardware ──────────────────────────────────────────────────────────────────

output:
  - platform: gpio
    pin: GPIO23
    id: scanner_trig_pin
    inverted: true  # LOW activates scanner

light:
  - platform: esp32_rmt_led_strip
    name: "${friendly_name} Status LED"
    id: atom_status_led
    pin: GPIO27
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb
    disabled_by_default: true
    effects:
      - pulse:
      - flicker:

switch:
  - platform: output
    name: "${friendly_name} Hardware Trigger"
    id: scanner_trigger_internal
    output: scanner_trig_pin
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    restore_mode: ALWAYS_OFF
    internal: true

# ── Connectivity LED ──────────────────────────────────────────────────────────

wifi:
  on_connect:
    - script.execute: led_api_connecting
  on_disconnect:
    - script.execute: led_wifi_connecting

api:
  on_client_connected:
    - script.execute: led_api_connected
  on_client_disconnected:
    # Only show "connecting" if no API client remains. This prevents a white
    # pulse when disconnecting the ESPHome CLI/dashboard during development
    # while Home Assistant is still connected.
    - if:
        condition:
          not:
            api.connected:
        then:
          - script.execute: led_api_connecting

# ── LED scripts ───────────────────────────────────────────────────────────────

script:
  # Return to the correct underlying state after any transient LED event.
  # Checks (in order): continuous mode → manual scan still active → API connected
  # → WiFi connected → WiFi disconnected. This ensures that a brief flash
  # (success, timeout, ack) always restores whatever state was "underneath" it,
  # rather than blindly turning the LED off regardless of connectivity or scan state.
  - id: led_off
    then:
      - if:
          condition:
            m5stack_barcode.is_continuous_mode:
              id: barcode_scanner
          then:
            - script.execute: led_continuous_scan_active
          else:
            - if:
                condition:
                  m5stack_barcode.is_manual_scanning:
                    id: barcode_scanner
                then:
                  # Scan still in progress (e.g. command-ack flash mid-scan) — restore blue.
                  - script.execute: led_manual_scan_start
                else:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - light.turn_off:
                            id: atom_status_led
                      else:
                        - if:
                            condition:
                              wifi.connected:
                            then:
                              - script.execute: led_api_connecting
                            else:
                              - script.execute: led_wifi_connecting

  # Connectivity states
  - id: led_wifi_connecting
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 50%
          red: 100%
          green: 40%
          blue: 0%
          effect: pulse

  - id: led_api_connecting
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 30%
          red: 100%
          green: 100%
          blue: 100%
          effect: pulse

  - id: led_api_connected
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          effect: none
      - delay: 1000ms
      - script.execute: led_off

  # Scan states
  - id: led_manual_scan_start
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%
          effect: none

  - id: led_continuous_scan_active
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 70%
          red: 80%
          green: 0%
          blue: 80%
          effect: none

  - id: led_scan_success
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          effect: none
      - delay: 500ms
      - script.execute: led_off

  - id: led_command_ack
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 70%
          green: 70%
          blue: 0%
          effect: none
      - delay: 200ms
      - script.execute: led_off

  - id: led_scan_timeout
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 100%
          green: 50%
          blue: 0%
          effect: none
      - delay: 500ms
      - script.execute: led_off

  # Hardware trigger: activates the scanner trig pin and waits for scan_duration
  # before timing out if the scanner hasn't responded.
  - id: hardware_trigger_with_timeout
    then:
      - script.execute: led_manual_scan_start
      - switch.turn_on: scanner_trigger_internal
      - delay: !lambda 'return id(barcode_scanner).get_scan_duration_ms();'
      - if:
          condition:
            switch.is_on: scanner_trigger_internal
          then:
            - switch.turn_off: scanner_trigger_internal
            - script.execute: led_scan_timeout

# ── Physical inputs ───────────────────────────────────────────────────────────

binary_sensor:
  # DLED: scanner hardware output — HIGH while the laser/LED is active.
  # Used to detect scan activity in non-HOST modes and to drive the ack LED flash.
  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT
      inverted: true  # DLED is active-LOW
    name: "${friendly_name} Detection LED"
    id: scanner_dled_pin
    entity_category: "diagnostic"
    icon: "mdi:led-on"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - script.execute: led_command_ack
        - if:
            condition:
              m5stack_barcode.is_continuous_mode:
                id: barcode_scanner
            then:
              - m5stack_barcode.process_current_buffer:
                  id: barcode_scanner
            else:
              - switch.turn_off: scanner_trigger_internal

  # Atom Lite built-in button — triggers a manual scan when idle.
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "${friendly_name} Button"
    id: atom_button
    entity_category: "diagnostic"
    icon: "mdi:gesture-tap-button"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - if:
            condition:
              m5stack_barcode.is_idle:
                id: barcode_scanner
            then:
              - button.press: start_scan_button

# ── HA buttons ────────────────────────────────────────────────────────────────

button:
  - platform: template
    name: "Start Scan"
    id: start_scan_button
    icon: "mdi:play-circle-outline"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: led_manual_scan_start
            - m5stack_barcode.start:
                id: barcode_scanner

  - platform: template
    name: "Stop Scan"
    icon: "mdi:stop-circle-outline"
    on_press:
      - m5stack_barcode.stop:
          id: barcode_scanner
      - script.execute: led_off

  - platform: template
    name: "Hardware Trigger"
    id: hardware_trigger_button
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: hardware_trigger_with_timeout

# ── Operation mode select (device-specific: drives LED on mode change) ────────
# ── Scan event LED hooks (device-specific) ────────────────────────────────────

m5stack_barcode:
  # Wire scan outcome events to the LED scripts defined in this file.
  # core.yaml registers the homeassistant.event action for on_barcode; these
  # entries are merged by the package system, so both fire on each event.
  on_barcode:
    - script.execute: led_scan_success
  on_scan_timeout:
    - script.execute: led_scan_timeout

  operation_mode_select:
    name: "Operation Mode"
    entity_category: "config"
    icon: "mdi:tune"
    on_value:
      # Guard: publish_initial_states_() fires on_value at boot before the API
      # is connected, which would clobber the wifi/api connectivity pulse LEDs.
      # Only act on mode changes that happen after the API is up.
      - if:
          condition:
            api.connected:
          then:
            - if:
                condition:
                  lambda: 'return x == "continuous" || x == "auto_sense";'
                then:
                  - script.execute: led_continuous_scan_active
                else:
                  - script.execute: led_off
