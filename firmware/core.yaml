# Shared scanner configuration — included by all device firmwares via packages.
#
# Everything here is device-agnostic: network stack, scanner component config,
# HA entities, and text sensors.  Hardware-specific items (GPIO pins, LED strip,
# physical buttons) live in the per-device file (e.g. atom_lite.yaml).
#
# Depends on the including file providing:
#   - uart_bus  (uart component id for the scanner serial connection)

external_components:
  - source: ../components
    components: [m5stack_barcode]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request

http_request:

wifi:
  ap:

captive_portal:

m5stack_barcode:
  id: barcode_scanner
  operation_mode: host
  terminator: none
  buzzer_volume: medium
  uart_id: uart_bus

  barcode_sensor:
    name: "Last Barcode"
    icon: "mdi:barcode"

  version_sensor:
    name: "Scanner Version"
    entity_category: "diagnostic"
    icon: "mdi:information-outline"

  scan_event:
    name: "Barcode Scanned"
    icon: "mdi:barcode-scan"

  on_barcode:
    - homeassistant.event:
        event: esphome.barcode_scanned
        data:
          barcode: !lambda return x;

  light_mode_select:
    name: "Light Mode"
    entity_category: "config"
    icon: "mdi:lightbulb"

  locate_light_mode_select:
    name: "Locate Light Mode"
    entity_category: "config"
    icon: "mdi:crosshairs"

  scan_duration_select:
    name: "Scan Duration"
    entity_category: "config"
    icon: "mdi:timer"

  buzzer_volume_select:
    name: "Volume"
    entity_category: "config"
    icon: "mdi:volume-medium"

  sound_switch:
    name: "Sound"
    entity_category: "config"
    icon: "mdi:volume-high"

  boot_sound_switch:
    name: "Boot Sound"
    entity_category: "config"
    icon: "mdi:power"

  decode_sound_switch:
    name: "Decode Sound"
    entity_category: "config"
    icon: "mdi:volume-source"

  decoding_success_light_switch:
    name: "Decoding Success Light"
    entity_category: "config"
    icon: "mdi:led-on"

  cmd_ack_sound_switch:
    name: "Command ACK Sound"
    entity_category: "config"
    icon: "mdi:bell-check"

  config_code_scan_switch:
    name: "Config Code Scanning"
    entity_category: "config"
    icon: "mdi:barcode-off"

  terminator_select:
    name: "Terminator"
    entity_category: "config"
    icon: "mdi:keyboard-return"

  stable_induction_time_select:
    name: "Stable Induction Time"
    entity_category: "config"
    icon: "mdi:timer-sand"

  reading_interval_select:
    name: "Reading Interval"
    entity_category: "config"
    icon: "mdi:timer-outline"

  same_code_interval_select:
    name: "Same Code Interval"
    entity_category: "config"
    icon: "mdi:timer-refresh"

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: "diagnostic"
    icon: "mdi:restart"
