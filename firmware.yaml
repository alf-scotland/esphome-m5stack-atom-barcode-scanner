substitutions:
  name: atom-barcode
  friendly_name: Atom Barcode Scanner
  project_name: esphome-m5stack-atom-barcode-scanner
  project_version: "2025.3.0-beta.1"

dashboard_import:
  package_import_url: github://scotland/esphome-m5stack-atom-barcode-scanner/firmware.yaml@main
  import_full_config: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: scotland.${project_name}
    version: ${project_version}

external_components:
  - source: components
    components: [m5stack_barcode]

esp32:
  board: m5stack-atom
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  - platform: esphome
  - platform: http_request

http_request:
  verify_ssl: false

safe_mode:
  disabled: true

wifi:
  # Set up a WiFi access point for initial configuration
  ap:

# Enable captive portal for easy WiFi setup
captive_portal:

# Status LED - Atom's built-in LED
light:
  - platform: esp32_rmt_led_strip
    name: "${friendly_name} Status LED"
    id: atom_status_led
    pin: GPIO27
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb
    disabled_by_default: true
    effects:
      - pulse:
      - flicker:

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: 19
  rx_pin: 22

# Define GPIO pins for hardware control
output:
  - platform: gpio
    pin: GPIO23
    id: scanner_trig_pin
    inverted: true  # LOW activates scanner

# Scripts for LED status indications
script:
  - id: led_off
    then:
      - if:
          condition:
            m5stack_barcode.is_continuous_mode:
              id: barcode_scanner
          then:
            - script.execute: led_continuous_scan_active
          else:
            - light.turn_off:
                id: atom_status_led

  - id: led_manual_scan_start
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%  # Blue for manual scanning

  - id: led_continuous_scan_active
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 70%
          red: 80%
          green: 0%
          blue: 80%  # Purple for continuous scanning

  - id: led_scan_success
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          flash_length: 500ms
      - delay: 500ms
      - script.execute: led_off

  - id: led_command_ack
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 70%
          green: 70%
          blue: 0%
          flash_length: 200ms
      - delay: 200ms
      - script.execute: led_off

  - id: led_scan_timeout
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 100%
          green: 50%
          blue: 0%
          flash_length: 500ms
      - delay: 500ms
      - script.execute: led_off

# Script to handle hardware trigger with proper timeout behavior
  - id: hardware_trigger_with_timeout
    then:
      - script.execute: led_manual_scan_start
      - switch.turn_on: scanner_trigger_internal
      - delay: !lambda 'return id(barcode_scanner).get_scan_duration_ms();'
      - if:
          condition:
            switch.is_on: scanner_trigger_internal
          then:
            - switch.turn_off: scanner_trigger_internal
            - script.execute: led_scan_timeout

# Script to handle operation mode changes
  - id: update_mode_led
    parameters:
      mode: string
    then:
      - if:
          condition:
            lambda: 'return mode == "continuous" || mode == "auto_sense";'
          then:
            - script.execute: led_continuous_scan_active
          else:
            - script.execute: led_off

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT
      inverted: true  # DLED is inverted (active LOW)
    name: "${friendly_name} Detection LED"
    id: scanner_dled_pin
    entity_category: "diagnostic"
    icon: "mdi:led-on"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - script.execute: led_command_ack
        - if:
            condition:
              m5stack_barcode.is_continuous_mode:
                id: barcode_scanner
            then:
              - m5stack_barcode.process_current_buffer:
                  id: barcode_scanner
            else:
              - switch.turn_off: scanner_trigger_internal

  # Atom Lite built-in button on GPIO39
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "${friendly_name} Button"
    id: atom_button
    entity_category: "diagnostic"
    icon: "mdi:gesture-tap-button"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - if:
            condition:
              m5stack_barcode.is_idle:
                id: barcode_scanner
            then:
              - button.press: start_scan_button

# Hardware trigger switch (internal)
switch:
  - platform: output
    name: "${friendly_name} Hardware Trigger"
    id: scanner_trigger_internal
    output: scanner_trig_pin
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    restore_mode: ALWAYS_OFF
    internal: true

text_sensor:
  - platform: template
    name: "Last Barcode"
    id: last_barcode
    icon: "mdi:barcode"

  - platform: template
    name: "Scanner Version"
    id: scanner_version
    entity_category: "diagnostic"
    icon: "mdi:information-outline"

button:
  - platform: template
    name: "Start Scan"
    id: start_scan_button
    icon: "mdi:play-circle-outline"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: led_manual_scan_start
            - m5stack_barcode.start:
                id: barcode_scanner

  - platform: template
    name: "Stop Scan"
    icon: "mdi:stop-circle-outline"
    on_press:
      - m5stack_barcode.stop:
          id: barcode_scanner
      - script.execute: led_off

  - platform: template
    name: "Hardware Trigger"
    id: hardware_trigger_button
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: hardware_trigger_with_timeout

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: "diagnostic"
    icon: "mdi:restart"

select:
  - platform: template
    name: "Operation Mode"
    id: operation_mode
    icon: "mdi:tune"
    setup_priority: 100
    options:
      - "host"
      - "level"
      - "pulse"
      - "continuous"
      - "auto_sense"
    initial_option: "host"
    optimistic: true
    on_value:
      - m5stack_barcode.set_mode:
          id: barcode_scanner
          operation_mode: !lambda "return x;"
      - script.execute:
          id: update_mode_led
          mode: !lambda "return x;"

event:
  - platform: template
    name: "Scanner Events"
    id: scanner_events
    icon: "mdi:barcode-scan"
    device_class: "button"
    event_types:
      - "scan_successful"
    on_event:
      then:
        - logger.log: "Scanner event triggered: {{ trigger.event_type }}"

m5stack_barcode:
  id: barcode_scanner
  barcode_id: last_barcode
  version_id: scanner_version
  operation_mode: host
  terminator: none
  buzzer_volume: medium
  uart_id: uart_bus
  barcode_event: scanner_events

  light_mode_select:
    name: "Light Mode"
    entity_category: "config"
    icon: "mdi:lightbulb"

  locate_light_mode_select:
    name: "Locate Light Mode"
    entity_category: "config"
    icon: "mdi:crosshairs"

  scan_duration_select:
    name: "Scan Duration"
    entity_category: "config"
    icon: "mdi:timer"

  buzzer_volume_select:
    name: "Volume"
    entity_category: "config"
    icon: "mdi:volume-medium"

  sound_switch:
    name: "Sound"
    entity_category: "config"
    icon: "mdi:volume-high"

  boot_sound_switch:
    name: "Boot Sound"
    entity_category: "config"
    icon: "mdi:power"

  decode_sound_switch:
    name: "Decode Sound"
    entity_category: "config"
    icon: "mdi:volume-source"

  decoding_success_light_switch:
    name: "Decoding Success Light"
    entity_category: "config"
    icon: "mdi:led-on"

  terminator_select:
    name: "Terminator"
    entity_category: "config"
    icon: "mdi:keyboard-return"

  stable_induction_time_select:
    name: "Stable Induction Time"
    entity_category: "config"
    icon: "mdi:timer-sand"

  reading_interval_select:
    name: "Reading Interval"
    entity_category: "config"
    icon: "mdi:timer-outline"

  same_code_interval_select:
    name: "Same Code Interval"
    entity_category: "config"
    icon: "mdi:timer-refresh"
