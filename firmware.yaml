substitutions:
  name: atom-barcode
  friendly_name: Atom Barcode Scanner
  project_name: esphome-m5stack-atom-barcode-scanner
  project_version: !env_var VERSION "0.1.0"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: scotland.${project_name}
    version: ${project_version}
  # Uncomment the line below if you're using a custom dashboard URL
  # dashboard_import_url: github://scotland/esphome-m5stack-atom-barcode-scanner/atom-barcode.yaml@main

external_components:
  - source: components
    components: [m5stack_barcode]

esp32:
  board: m5stack-atom
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG # Change to DEBUG for development

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable OTA updates
ota:
  - platform: esphome
    password: !secret ota_password
  # Enable HTTP OTA updates
  - platform: http_request

http_request:
  verify_ssl: false

safe_mode:
  disabled: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fast reconnect for better reliability
  fast_connect: true
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

# Status LED - Atom's built-in LED
light:
  - platform: esp32_rmt_led_strip
    name: "${friendly_name} Status LED"
    id: atom_status_led
    pin: GPIO27
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb
    rmt_channel: 0
    effects:
      - pulse:
      - flicker:

uart:
  baud_rate: 9600
  tx_pin: 19
  rx_pin: 22

# Define GPIO pins for hardware control
# TRIG pin - LOW to activate scanner, HIGH to deactivate
# DLED pin - HIGH when QR code is detected
output:
  - platform: gpio
    pin: GPIO23
    id: scanner_trig_pin
    inverted: true  # Inverted because LOW activates the scanner
    
binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO33
      mode: INPUT
    name: "${friendly_name} Detection LED"
    id: scanner_dled_pin
    entity_category: "diagnostic"
    icon: "mdi:led-on"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: "QR code detected via DLED pin"
        - light.turn_on:
            id: atom_status_led
            brightness: 100%
            red: 100%
            green: 0%
            blue: 0%
            flash_length: 500ms
            
  # Atom Lite built-in button on GPIO39
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "${friendly_name} Button"
    id: atom_button
    entity_category: "diagnostic"
    icon: "mdi:gesture-tap-button"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - logger.log: "Atom button pressed, toggling scanner"
        - switch.toggle: scanner_trigger_switch
        - light.turn_on:
            id: atom_status_led
            brightness: 100%
            red: 100%
            green: 65%
            blue: 0%
            flash_length: 200ms

# Hardware trigger switch
switch:
  - platform: output
    name: "${friendly_name} Hardware Trigger"
    id: scanner_trigger_switch
    output: scanner_trig_pin
    icon: "mdi:barcode-scan"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - logger.log: "Hardware trigger activated"
        - light.turn_on:
            id: atom_status_led
            brightness: 100%
            red: 0%
            green: 0%
            blue: 100%
    on_turn_off:
      then:
        - logger.log: "Hardware trigger deactivated"
        - light.turn_on:
            id: atom_status_led
            brightness: 100%
            red: 0%
            green: 100%
            blue: 0%

text_sensor:
  - platform: template
    name: "Last Barcode"
    id: last_barcode
    icon: "mdi:barcode"
    on_value:
      then:
        - if:
            condition:
              not:
                text_sensor.state:
                  id: last_barcode
                  state: ""
            then:
              - logger.log:
                  format: "Barcode detected: %s"
                  args: ["x.c_str()"]
              - light.turn_on:
                  id: atom_status_led
                  brightness: 100%
                  red: 100%
                  green: 0%
                  blue: 0%
                  flash_length: 500ms
    
  - platform: template
    name: "Scanner Version"
    id: scanner_version
    entity_category: "diagnostic"
    icon: "mdi:information-outline"
    
  # Add firmware version sensor
  - platform: version
    name: "${friendly_name} Firmware Version"
    entity_category: "diagnostic"
    icon: "mdi:chip"
    hide_timestamp: true

button:
  - platform: template
    name: "Start Scan"
    icon: "mdi:play-circle-outline"
    on_press:
      - m5stack_barcode.start: 
          id: barcode_scanner
      
  - platform: template
    name: "Stop Scan"
    icon: "mdi:stop-circle-outline"
    on_press:
      - m5stack_barcode.stop: 
          id: barcode_scanner
      
  # Add restart button
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: "config"
    icon: "mdi:restart"

select:
  - platform: template
    name: "Operation Mode"
    id: operation_mode
    entity_category: "config"
    icon: "mdi:tune"
    options:
      - "host"
      - "level"
      - "pulse"
      - "continuous"
      - "auto_sense"
    initial_option: "host"
    optimistic: true
    on_value:
      - m5stack_barcode.set_mode:
          id: barcode_scanner
          mode: !lambda 'return x;'
          
  - platform: template
    name: "Terminator"
    id: terminator
    entity_category: "config"
    icon: "mdi:keyboard-return"
    options:
      - "none"
      - "crlf"
      - "cr"
      - "tab"
      - "crcr"
      - "crlfcrlf"
    initial_option: "crlf"
    optimistic: true
    on_value:
      - m5stack_barcode.set_terminator:
          id: barcode_scanner
          terminator: !lambda 'return x;'
          
  - platform: template
    name: "Light Mode"
    id: light_mode
    entity_category: "config"
    icon: "mdi:lightbulb"
    options:
      - "on_when_reading"
      - "always_on"
      - "always_off"
    initial_option: "on_when_reading"
    optimistic: true
    on_value:
      - m5stack_barcode.set_light_mode:
          id: barcode_scanner
          light_mode: !lambda 'return x;'

  - platform: template
    name: "Sound Mode"
    id: sound_mode
    entity_category: "config"
    icon: "mdi:volume-high"
    options:
      - "disabled"
      - "enabled"
    initial_option: "disabled"
    optimistic: true
    on_value:
      - m5stack_barcode.set_sound_mode:
          id: barcode_scanner
          sound_mode: !lambda 'return x;'

m5stack_barcode:
  id: barcode_scanner
  barcode_id: last_barcode
  version_id: scanner_version
  mode: host
  terminator: crlf
