substitutions:
  name: atom-barcode
  friendly_name: Atom Barcode Scanner
  project_name: esphome-m5stack-atom-barcode-scanner
  project_version: "2025.3.0-beta.1"

dashboard_import:
  package_import_url: github://scotland/esphome-m5stack-atom-barcode-scanner/firmware.yaml@main
  import_full_config: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: scotland.${project_name}
    version: ${project_version}

external_components:
  - source: components
    components: [m5stack_barcode]

esp32:
  board: m5stack-atom
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  - platform: esphome
  - platform: http_request

http_request:
  verify_ssl: false

safe_mode:
  disabled: true

wifi:
  # Set up a WiFi access point for initial configuration
  ap:

# Enable captive portal for easy WiFi setup
captive_portal:

# Global variables for timeout handling
globals:
  - id: timeout_ms
    type: int
    restore_value: no
    initial_value: '3000'

# Status LED - Atom's built-in LED
light:
  - platform: esp32_rmt_led_strip
    name: "${friendly_name} Status LED"
    id: atom_status_led
    pin: GPIO27
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb
    rmt_channel: 0
    effects:
      - pulse:
      - flicker:

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: 19
  rx_pin: 22

# Define GPIO pins for hardware control
output:
  - platform: gpio
    pin: GPIO23
    id: scanner_trig_pin
    inverted: true  # LOW activates scanner

# Scripts for LED status indications
script:
  - id: led_off
    then:
      - if:
          condition:
            m5stack_barcode.is_continuous_mode:
              id: barcode_scanner
          then:
            - script.execute: led_continuous_scan_active
          else:
            - light.turn_off:
                id: atom_status_led

  - id: led_manual_scan_start
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%  # Blue for manual scanning

  - id: led_continuous_scan_active
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 70%
          red: 80%
          green: 0%
          blue: 80%  # Purple for continuous scanning

  - id: led_scan_success
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          flash_length: 500ms
      - delay: 500ms
      - script.execute: led_off

  - id: led_command_ack
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 70%
          green: 70%
          blue: 0%
          flash_length: 200ms
      - delay: 200ms
      - script.execute: led_off

  - id: led_scan_timeout
    then:
      - light.turn_on:
          id: atom_status_led
          brightness: 100%
          red: 100%
          green: 50%
          blue: 0%
          flash_length: 500ms
      - delay: 500ms
      - script.execute: led_off

# Script to handle hardware trigger with proper timeout behavior
  - id: hardware_trigger_with_timeout
    then:
      - script.execute: led_manual_scan_start
      - switch.turn_on: scanner_trigger_internal
      - delay: !lambda 'return id(timeout_ms);'
      - if:
          condition:
            switch.is_on: scanner_trigger_internal
          then:
            - switch.turn_off: scanner_trigger_internal
            - script.execute: led_scan_timeout

# Script to handle operation mode changes
  - id: update_mode_led
    parameters:
      mode: string
    then:
      - if:
          condition:
            lambda: 'return mode == "continuous" || mode == "auto_sense";'
          then:
            - script.execute: led_continuous_scan_active
          else:
            - script.execute: led_off

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT
      inverted: true  # DLED is inverted (active LOW)
    name: "${friendly_name} Detection LED"
    id: scanner_dled_pin
    entity_category: "diagnostic"
    icon: "mdi:led-on"
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - script.execute: led_command_ack
        - if:
            condition:
              m5stack_barcode.is_continuous_mode:
                id: barcode_scanner
            then:
              - m5stack_barcode.process_current_buffer:
                  id: barcode_scanner
            else:
              - switch.turn_off: scanner_trigger_internal

  # Atom Lite built-in button on GPIO39
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "${friendly_name} Button"
    id: atom_button
    entity_category: "diagnostic"
    icon: "mdi:gesture-tap-button"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - if:
            condition:
              m5stack_barcode.is_idle:
                id: barcode_scanner
            then:
              - button.press: start_scan_button

# Hardware trigger switch (internal)
switch:
  - platform: output
    name: "${friendly_name} Hardware Trigger"
    id: scanner_trigger_internal
    output: scanner_trig_pin
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    restore_mode: ALWAYS_OFF
    internal: true

text_sensor:
  - platform: template
    name: "Last Barcode"
    id: last_barcode
    icon: "mdi:barcode"
    on_value:
      then:
        - if:
            condition:
              not:
                text_sensor.state:
                  id: last_barcode
                  state: ''
            then:
              - script.execute: led_scan_success

  - platform: template
    name: "Scanner Version"
    id: scanner_version
    entity_category: "diagnostic"
    icon: "mdi:information-outline"

button:
  - platform: template
    name: "Start Scan"
    id: start_scan_button
    icon: "mdi:play-circle-outline"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: led_manual_scan_start
            - m5stack_barcode.start:
                id: barcode_scanner

  - platform: template
    name: "Stop Scan"
    icon: "mdi:stop-circle-outline"
    on_press:
      - m5stack_barcode.stop:
          id: barcode_scanner
      - script.execute: led_off

  - platform: template
    name: "Hardware Trigger"
    id: hardware_trigger_button
    icon: "mdi:barcode-scan"
    entity_category: "diagnostic"
    on_press:
      - if:
          condition:
            m5stack_barcode.is_idle:
              id: barcode_scanner
          then:
            - script.execute: hardware_trigger_with_timeout

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: "config"
    icon: "mdi:restart"

select:
  - platform: template
    name: "Operation Mode"
    id: operation_mode
    entity_category: "config"
    icon: "mdi:tune"
    setup_priority: 100
    options:
      - "host"
      - "level"
      - "pulse"
      - "continuous"
      - "auto_sense"
    initial_option: "host"
    optimistic: true
    on_value:
      - m5stack_barcode.set_mode:
          id: barcode_scanner
          operation_mode: !lambda "return x;"
      - script.execute:
          id: update_mode_led
          mode: !lambda "return x;"

  - platform: template
    name: "Terminator"
    id: terminator
    entity_category: "config"
    icon: "mdi:keyboard-return"
    setup_priority: 100
    options:
      - "none"
      - "crlf"
      - "cr"
      - "tab"
      - "crcr"
      - "crlfcrlf"
    initial_option: "crlf"
    optimistic: true
    on_value:
      - m5stack_barcode.set_terminator:
          id: barcode_scanner
          terminator: !lambda "return x;"

  - platform: template
    name: "Light Mode"
    id: light_mode
    entity_category: "config"
    icon: "mdi:lightbulb"
    setup_priority: 100
    options:
      - "on_when_reading"
      - "always_on"
      - "always_off"
    initial_option: "on_when_reading"
    optimistic: true
    on_value:
      - m5stack_barcode.set_light_mode:
          id: barcode_scanner
          light_mode: !lambda "return x;"

  - platform: template
    name: "Locate Light Mode"
    id: locate_light_mode
    entity_category: "config"
    icon: "mdi:crosshairs"
    setup_priority: 100
    options:
      - "on_when_reading"
      - "always_on"
      - "always_off"
    initial_option: "on_when_reading"
    optimistic: true
    on_value:
      - m5stack_barcode.set_locate_light_mode:
          id: barcode_scanner
          locate_light_mode: !lambda "return x;"

  - platform: template
    name: "Decoding Success Light"
    id: decoding_success_light
    entity_category: "config"
    icon: "mdi:led-on"
    setup_priority: 100
    options:
      - "enabled"
      - "disabled"
    initial_option: "enabled"
    optimistic: true
    on_value:
      - m5stack_barcode.set_decoding_success_light_mode:
          id: barcode_scanner
          decoding_success_light_mode: !lambda "return x;"

  - platform: template
    name: "Sound Mode"
    id: sound_mode
    entity_category: "config"
    icon: "mdi:volume-high"
    setup_priority: 100
    options:
      - "disabled"
      - "enabled"
    initial_option: "disabled"
    optimistic: true
    on_value:
      - m5stack_barcode.set_sound_mode:
          id: barcode_scanner
          sound_mode: !lambda "return x;"

  - platform: template
    name: "Boot Sound"
    id: boot_sound
    entity_category: "config"
    icon: "mdi:power"
    setup_priority: 100
    options:
      - "enabled"
      - "disabled"
    initial_option: "enabled"
    optimistic: true
    on_value:
      - m5stack_barcode.set_boot_sound_mode:
          id: barcode_scanner
          boot_sound_mode: !lambda "return x;"

  - platform: template
    name: "Decode Sound"
    id: decode_sound
    entity_category: "config"
    icon: "mdi:volume-source"
    setup_priority: 100
    options:
      - "enabled"
      - "disabled"
    initial_option: "enabled"
    optimistic: true
    on_value:
      - m5stack_barcode.set_decode_sound_mode:
          id: barcode_scanner
          decode_sound_mode: !lambda "return x;"

  - platform: template
    name: "Volume"
    id: volume
    entity_category: "config"
    icon: "mdi:volume-medium"
    setup_priority: 100
    options:
      - "high"
      - "medium"
      - "low"
    initial_option: "medium"
    optimistic: true
    on_value:
      - m5stack_barcode.set_buzzer_volume:
          id: barcode_scanner
          buzzer_volume: !lambda "return x;"

  - platform: template
    name: "Scan Duration"
    id: scan_duration
    entity_category: "config"
    icon: "mdi:timer"
    setup_priority: 100
    options:
      - "500ms"
      - "1s"
      - "3s"
      - "5s"
      - "10s"
      - "15s"
      - "20s"
      - "unlimited"
    initial_option: "3s"
    optimistic: true
    on_value:
      - m5stack_barcode.set_scan_duration:
          id: barcode_scanner
          scan_duration: !lambda "return x;"
          global_ms_var: timeout_ms

  - platform: template
    name: "Stable Induction Time"
    id: stable_induction_time
    entity_category: "config"
    icon: "mdi:timer-sand"
    setup_priority: 100
    options:
      - "0ms"
      - "100ms"
      - "300ms"
      - "500ms"
      - "1s"
    initial_option: "500ms"
    optimistic: true
    on_value:
      - m5stack_barcode.set_stable_induction_time:
          id: barcode_scanner
          stable_induction_time: !lambda "return x;"

  - platform: template
    name: "Reading Interval"
    id: reading_interval
    entity_category: "config"
    icon: "mdi:timer-outline"
    setup_priority: 100
    options:
      - "0ms"
      - "100ms"
      - "300ms"
      - "500ms"
      - "1s"
      - "1.5s"
      - "2s"
    initial_option: "500ms"
    optimistic: true
    on_value:
      - m5stack_barcode.set_reading_interval:
          id: barcode_scanner
          reading_interval: !lambda "return x;"

  - platform: template
    name: "Same Code Interval"
    id: same_code_interval
    entity_category: "config"
    icon: "mdi:timer-refresh"
    setup_priority: 100
    options:
      - "0ms"
      - "100ms"
      - "300ms"
      - "500ms"
      - "1s"
      - "1.5s"
      - "2s"
    initial_option: "500ms"
    optimistic: true
    on_value:
      - m5stack_barcode.set_same_code_interval:
          id: barcode_scanner
          same_code_interval: !lambda "return x;"

m5stack_barcode:
  id: barcode_scanner
  barcode_id: last_barcode
  version_id: scanner_version
  operation_mode: host
  terminator: crlf
  uart_id: uart_bus
