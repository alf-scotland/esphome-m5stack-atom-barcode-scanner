repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: firmware.yaml
      - id: check-added-large-files
      - id: debug-statements
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]

  # C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  # C++ static analysis with cppcheck
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cppcheck
        args:
          - --std=c++17
          - --language=c++
          - --enable=warning,style,performance,portability
          - --suppress=missingInclude
          - --suppress=unusedFunction
          - --suppress=unusedStructMember
          - --suppress=constVariableReference

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-tidy
        stages: [manual]
        args:
          - -header-filter=.*
          - -fix
          - --
          - -std=c++17
          - -I/usr/local/opt/llvm/include/c++/v1
          - -I/usr/local/opt/llvm/lib/clang/19.1.7/include
          - -I.
          - -Icomponents
          - -I.venv/lib/python3.9/site-packages/esphome
